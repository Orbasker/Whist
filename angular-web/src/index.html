              "text": "Israeli Whist is a popular 4-player trick-taking card game where all 52 cards are dealt (13 each). Players bid on a trump suit in an auction, then each declares how many tricks they will take. The total bids cannot equal 13, forcing the last bidder to push the game Over or Under."

            "acceptedAnswer": {
              "@type": "Answer",

            }
          },
          {
            "@type": "Question",
            "name": "How many players do you need for Israeli Whist?",
            "acceptedAnswer": {

              "text": "Israeli Whist is played with exactly 4 players. Each player plays for themselves — there are no teams. Every player receives 13 cards from a standard 52-card deck."
