<app-modal [title]="'game.roundSummary.title' | translate" size="sm" (close)="onContinue()">
  <div class="min-h-0 flex-1 overflow-y-auto">
    <div *ngIf="results" class="space-y-3">
      <div
        *ngFor="let player of results.players; let i = index"
        class="rounded-lg border border-border bg-card p-3"
      >
        <div class="flex items-center justify-between">
          <div>
            <div class="font-medium text-foreground">{{ player }}</div>
            <div class="text-sm text-muted-foreground">
              {{
                'game.roundSummary.bidTook'
                  | translate: { bid: results.bids[i], took: results.tricks[i] }
              }}
            </div>
          </div>
          <div class="text-right">
            <div
              class="font-bold"
              [class.text-success]="results.roundScores[i] > 0"
              [class.text-destructive]="results.roundScores[i] < 0"
              [class.text-foreground]="results.roundScores[i] === 0"
            >
              {{ results.roundScores[i] > 0 ? '+' : '' }}{{ results.roundScores[i] }}
            </div>
            <div class="text-sm text-muted-foreground">
              {{ 'game.roundSummary.total' | translate }}: {{ results.newTotalScores[i] }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button
    type="button"
    (click)="onContinue()"
    class="mt-6 w-full min-h-touch rounded-lg bg-primary py-3 px-6 font-semibold text-primary-foreground transition-colors hover:bg-primary/90"
  >
    {{ 'game.roundSummary.continueNext' | translate }}
  </button>
</app-modal>
