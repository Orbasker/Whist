<app-modal [title]="'game.roundSummary.title' | translate" size="sm" (close)="onContinue()">
  <div class="min-h-0 flex-1 overflow-y-auto">
    <div *ngIf="results" class="space-y-3">
      <div
        *ngFor="let player of results.players; let i = index"
        class="bg-surface-container-low rounded-xl p-4"
      >
        <div class="flex items-center justify-between">
          <div>
            <div class="font-semibold text-on-surface">{{ player }}</div>
            <div class="text-sm text-on-surface-variant">
              {{
                'game.roundSummary.bidTook'
                  | translate: { bid: results.bids[i], took: results.tricks[i] }
              }}
            </div>
          </div>
          <div class="text-right">
            <div
              class="text-2xl font-bold"
              [class.text-secondary]="results.roundScores[i] > 0"
              [class.text-destructive]="results.roundScores[i] < 0"
              [class.text-on-surface]="results.roundScores[i] === 0"
            >
              {{ results.roundScores[i] > 0 ? '+' : '' }}{{ results.roundScores[i] }}
            </div>
            <div class="text-sm text-on-surface-variant">
              {{ 'game.roundSummary.total' | translate }}: {{ results.newTotalScores[i] }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button
    type="button"
    (click)="onContinue()"
    class="mt-6 w-full h-14 btn-gradient rounded-xl font-bold active:scale-[0.98] transition-all"
  >
    {{ 'game.roundSummary.continueNext' | translate }}
  </button>
</app-modal>
