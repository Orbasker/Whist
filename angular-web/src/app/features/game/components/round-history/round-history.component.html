<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" (click)="onClose()">
  <div class="bg-slate-800 rounded-lg max-w-3xl w-full max-h-[80vh] overflow-y-auto p-6" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-bold text-white">היסטוריית סיבובים</h2>
      <button (click)="onClose()" class="text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div *ngIf="rounds.length === 0" class="text-slate-400 text-center py-8">
      אין סיבובים עדיין
    </div>

    <div *ngIf="rounds.length > 0" class="overflow-x-auto">
      <table class="w-full text-sm text-right">
        <thead>
          <tr class="text-slate-400 border-b border-slate-700">
            <th class="pb-2 pr-2 font-semibold">סיבוב</th>
            <th class="pb-2 px-2 font-semibold">קלף עליון</th>
            <th *ngFor="let player of players" class="pb-2 px-2 font-semibold text-center" [attr.colspan]="3">
              {{ player }}
            </th>
          </tr>
          <tr class="text-slate-500 border-b border-slate-700">
            <th class="pb-2 pr-2"></th>
            <th class="pb-2 px-2"></th>
            <ng-container *ngFor="let player of players">
              <th class="pb-2 px-1 font-normal text-center">הצעה</th>
              <th class="pb-2 px-1 font-normal text-center">לקח</th>
              <th class="pb-2 px-1 font-normal text-center">ניקוד</th>
            </ng-container>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let round of rounds" class="border-b border-slate-700 hover:bg-slate-700/50">
            <td class="py-2 pr-2 text-white font-medium">{{ round.round_number }}</td>
            <td class="py-2 px-2 text-center text-lg">{{ getTrumpSymbol(round.trump_suit) }}</td>
            <ng-container *ngFor="let player of players; let i = index">
              <td class="py-2 px-1 text-center text-slate-300">{{ round.bids[i] }}</td>
              <td class="py-2 px-1 text-center text-slate-300">{{ round.tricks[i] }}</td>
              <td class="py-2 px-1 text-center font-semibold"
                  [class.text-green-400]="round.scores[i] > 0"
                  [class.text-red-400]="round.scores[i] < 0"
                  [class.text-slate-300]="round.scores[i] === 0">
                {{ round.scores[i] }}
              </td>
            </ng-container>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
