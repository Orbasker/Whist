<div class="min-h-screen relative z-10" *ngIf="gameState">
  <div
    *ngIf="serviceLoading"
    class="fixed inset-0 z-[90] flex items-center justify-center bg-background/55 backdrop-blur-sm"
    aria-live="polite"
  >
    <app-loader></app-loader>
  </div>

  <!-- Header -->
  <header class="bg-surface-container-lowest/60 backdrop-blur-xl sticky top-0 z-40">
    <div class="flex items-center justify-between px-6 py-4 max-w-screen-xl mx-auto">
      <div class="flex items-center gap-4">
        <button
          (click)="goBack()"
          class="text-primary hover:bg-surface-container-highest/50 transition-colors p-2 rounded-full active:scale-95 duration-200"
          [attr.aria-label]="'game.back' | translate"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div>
          <h1 class="font-headline font-bold tracking-tight text-on-surface text-lg">
            {{ 'game.scoreBoard' | translate }}
          </h1>
          <p class="text-xs text-on-surface-variant">
            {{ 'game.roundsPlayed' | translate: { count: gameState.current_round - 1 } }}
            ·
            {{ phase === 'bidding' ? ('game.bidding' | translate) : ('game.tricks' | translate) }}
          </p>
        </div>
      </div>
      <button
        (click)="showScoreTable = true"
        class="text-primary hover:bg-surface-container-highest/50 transition-colors p-2 rounded-full active:scale-95 duration-200"
        [attr.aria-label]="'game.scoreTable' | translate"
      >
        <span class="material-symbols-outlined">table_chart</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="mx-auto max-w-2xl p-4 pb-28 sm:p-6 sm:pb-24">
    <app-bidding-phase
      *ngIf="phase === 'bidding'"
      [players]="gameState.players"
      [roundsPlayed]="gameState.current_round - 1"
      (bidsSubmit)="onBidsSubmit($event.bids, $event.trumpSuit)"
      (openScoreTable)="showScoreTable = true"
      (openRoundHistory)="showRoundHistory = true"
    ></app-bidding-phase>

    <app-tricks-phase
      *ngIf="phase === 'tricks'"
      [players]="gameState.players"
      [roundsPlayed]="gameState.current_round - 1"
      (tricksSubmit)="onTricksSubmit($event)"
      (openScoreTable)="showScoreTable = true"
      (openRoundHistory)="showRoundHistory = true"
    ></app-tricks-phase>
  </div>

  <!-- Score Table Modal -->
  <app-score-table
    *ngIf="showScoreTable"
    [gameState]="gameState"
    [isGameOwner]="isGameOwner"
    [currentPlayerIndex]="currentPlayerIndex"
    [currentUserId]="currentUserId"
    (dismiss)="showScoreTable = false"
    (deleteRequested)="onDeleteGameRequested()"
  ></app-score-table>

  <!-- Round Summary Modal -->
  <app-round-summary
    *ngIf="showRoundSummary && roundResults"
    [results]="roundResults"
    (close)="onRoundSummaryClose()"
  ></app-round-summary>

  <!-- Round History Modal -->
  <app-round-history
    *ngIf="showRoundHistory"
    [rounds]="rounds"
    [players]="gameState.players"
    [currentPlayerIndex]="currentPlayerIndex"
    (close)="showRoundHistory = false"
  ></app-round-history>
</div>

<div *ngIf="!gameState" class="flex min-h-screen items-center justify-center bg-background">
  <app-loader></app-loader>
</div>
