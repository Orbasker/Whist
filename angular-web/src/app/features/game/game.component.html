<div
  class="min-h-screen bg-gradient-to-br from-background via-card to-background"
  *ngIf="gameState"
>
  <!-- Header -->
  <div
    class="safe-area-inset-top sticky top-0 z-40 border-b border-border/60 bg-background/90 backdrop-blur-lg"
  >
    <div class="flex items-center justify-between p-3 sm:p-4">
      <button
        (click)="goBack()"
        class="-m-1 flex min-h-touch min-w-touch items-center justify-center rounded-lg p-2 text-muted-foreground transition-colors hover:text-foreground"
        [attr.aria-label]="'game.back' | translate"
      >
        <svg
          class="h-5 w-5 sm:h-6 sm:w-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>
      <div class="min-w-0 flex-1 text-center">
        <h1 class="text-base font-semibold text-foreground sm:text-lg">
          {{ 'game.scoreBoard' | translate }}
        </h1>
        <p class="text-xs text-muted-foreground">
          {{ 'game.roundsPlayed' | translate: { count: gameState.current_round - 1 } }}
          ·
          {{ phase === 'bidding' ? ('game.bidding' | translate) : ('game.tricks' | translate) }}
        </p>
      </div>
      <button
        (click)="showScoreTable = true"
        class="-m-1 flex min-h-touch min-w-touch items-center justify-center rounded-lg p-2 text-primary transition-colors hover:text-primary/90"
        [attr.aria-label]="'game.scoreTable' | translate"
      >
        <app-scoreboard-icon [size]="20" color="currentColor"></app-scoreboard-icon>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="p-4 sm:p-6 pb-28 sm:pb-24">
    <app-bidding-phase
      *ngIf="phase === 'bidding'"
      [players]="gameState.players"
      (bidsSubmit)="onBidsSubmit($event.bids, $event.trumpSuit)"
    ></app-bidding-phase>

    <app-tricks-phase
      *ngIf="phase === 'tricks'"
      [players]="gameState.players"
      (tricksSubmit)="onTricksSubmit($event)"
    ></app-tricks-phase>
  </div>

  <!-- Floating Score board button -->
  <div class="floating-scoreboard-wrap">
    <button
      (click)="showRoundHistory = true"
      class="flex min-h-touch items-center gap-2 rounded-full bg-primary px-5 py-3 font-semibold text-primary-foreground shadow-lg shadow-primary/25 transition-colors hover:bg-primary/90 sm:py-2.5 sm:text-base text-sm"
    >
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 10h16M4 14h16M4 18h16"
        ></path>
      </svg>
      {{ 'game.roundsHistory' | translate: { count: rounds.length } }}
    </button>
  </div>

  <!-- Score Table Modal -->
  <app-score-table
    *ngIf="showScoreTable"
    [gameState]="gameState"
    [isGameOwner]="isGameOwner"
    [currentPlayerIndex]="currentPlayerIndex"
    [currentUserId]="currentUserId"
    (dismiss)="showScoreTable = false"
    (deleteRequested)="onDeleteGameRequested()"
  ></app-score-table>

  <!-- Round Summary Modal -->
  <app-round-summary
    *ngIf="showRoundSummary && roundResults"
    [results]="roundResults"
    (close)="onRoundSummaryClose()"
  ></app-round-summary>

  <!-- Round History Modal -->
  <app-round-history
    *ngIf="showRoundHistory"
    [rounds]="rounds"
    [players]="gameState.players"
    [currentPlayerIndex]="currentPlayerIndex"
    (close)="showRoundHistory = false"
  >
  </app-round-history>
</div>

<div *ngIf="!gameState" class="flex min-h-screen items-center justify-center bg-background">
  <div class="h-8 w-8 animate-spin rounded-full border-4 border-primary border-t-transparent"></div>
</div>
