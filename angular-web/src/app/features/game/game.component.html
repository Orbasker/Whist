<div
  class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  *ngIf="gameState"
>
  <!-- Header -->
  <div
    class="sticky top-0 z-40 bg-slate-900/80 backdrop-blur-lg border-b border-slate-700/50 safe-area-inset-top"
  >
    <div class="flex items-center justify-between p-3 sm:p-4">
      <button
        (click)="goBack()"
        class="min-h-touch min-w-touch flex items-center justify-center p-2 -m-1 text-slate-400 hover:text-white transition-colors"
        [attr.aria-label]="'game.back' | translate"
      >
        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>
      <div class="text-center flex-1 min-w-0">
        <h1 class="text-base sm:text-lg font-semibold text-white">
          {{ 'game.round' | translate }} {{ gameState.current_round }}
        </h1>
        <p class="text-xs text-slate-400">
          {{ phase === 'bidding' ? ('game.bidding' | translate) : ('game.tricks' | translate) }}
        </p>
      </div>
      <button
        (click)="showScoreTable = true"
        class="min-h-touch min-w-touch flex items-center justify-center p-2 -m-1 text-amber-400 hover:text-amber-300 transition-colors"
        [title]="'game.scoreTable' | translate"
      >
        <app-scoreboard-icon [size]="20" color="currentColor"></app-scoreboard-icon>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="p-4 sm:p-6 pb-28 sm:pb-24">
    <app-bidding-phase
      *ngIf="phase === 'bidding'"
      [players]="gameState.players"
      (bidsSubmit)="onBidsSubmit($event.bids, $event.trumpSuit)"
    ></app-bidding-phase>

    <app-tricks-phase
      *ngIf="phase === 'tricks'"
      [players]="gameState.players"
      (tricksSubmit)="onTricksSubmit($event)"
    ></app-tricks-phase>
  </div>

  <!-- Floating Round History Button -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-30 safe-area-inset-bottom">
    <button
      (click)="showRoundHistory = true"
      class="min-h-touch flex items-center gap-2 px-5 py-3 sm:py-2.5 bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold rounded-full shadow-lg shadow-amber-500/30 transition-colors text-sm sm:text-base"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 10h16M4 14h16M4 18h16"
        ></path>
      </svg>
      {{ 'game.roundsHistory' | translate: { count: rounds.length } }}
    </button>
  </div>

  <!-- Score Table Modal -->
  <app-score-table
    *ngIf="showScoreTable"
    [gameState]="gameState"
    [isGameOwner]="isGameOwner"
    [currentPlayerIndex]="currentPlayerIndex"
    [currentUserId]="currentUserId"
    (dismiss)="showScoreTable = false"
    (deleteRequested)="onDeleteGameRequested()"
  ></app-score-table>

  <!-- Round Summary Modal -->
  <app-round-summary
    *ngIf="showRoundSummary && roundResults"
    [results]="roundResults"
    (close)="onRoundSummaryClose()"
  ></app-round-summary>

  <!-- Round History Modal -->
  <app-round-history
    *ngIf="showRoundHistory"
    [rounds]="rounds"
    [players]="gameState.players"
    [currentPlayerIndex]="currentPlayerIndex"
    (close)="showRoundHistory = false"
  >
  </app-round-history>
</div>

<div *ngIf="!gameState" class="min-h-screen bg-slate-900 flex items-center justify-center">
  <div
    class="animate-spin w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full"
  ></div>
</div>
