<app-modal [title]="title" size="sm" (close)="onClose()">
  <p class="text-[var(--text-secondary)] mb-6">{{ message }}</p>
  <div class="flex flex-wrap gap-3 justify-end">
    <button
      type="button"
      (click)="onCancel()"
      class="min-h-touch bg-slate-600 hover:bg-slate-500 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm"
    >
      {{ cancelLabel }}
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      [class]="
        danger
          ? 'min-h-touch bg-red-600 hover:bg-red-500 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm'
          : 'min-h-touch bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm'
      "
    >
      {{ confirmLabel }}
    </button>
  </div>
</app-modal>
