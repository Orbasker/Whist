<footer
  class="fixed bottom-0 left-0 right-0 z-[60] flex shrink-0 flex-col items-center border-t border-border bg-background/95 pb-[env(safe-area-inset-bottom,0px)] pt-1 text-center"
  role="contentinfo"
>
  <!-- Collapsed: single trigger at bottom -->
  <button
    type="button"
    (click)="toggle(); $event.stopPropagation()"
    class="flex min-h-touch items-center justify-center gap-1.5 rounded-t-md px-4 py-2 text-muted-foreground transition-colors hover:bg-muted/50 hover:text-foreground"
    [attr.aria-expanded]="expanded"
    [attr.aria-label]="'footer.language' | translate"
  >
    <span class="text-[0.8125rem]">{{ 'footer.language' | translate }}</span>
    <span class="text-xs" aria-hidden="true">{{ expanded ? '▲' : '▼' }}</span>
  </button>
  <!-- Expanded: language options -->
  <div
    *ngIf="expanded"
    class="flex items-center justify-center gap-2 border-t border-border/50 bg-background/98 px-4 py-3"
    role="group"
    [attr.aria-label]="'footer.language' | translate"
  >
    <button
      type="button"
      class="min-h-touch min-w-touch rounded-md border px-3 py-1.5 text-sm font-medium transition-colors"
      [ngClass]="
        currentLang === 'he'
          ? 'border-primary bg-primary/20 text-primary'
          : 'border-input text-muted-foreground hover:bg-accent hover:text-accent-foreground'
      "
      [attr.aria-pressed]="currentLang === 'he'"
      (click)="setHebrew()"
    >
      {{ 'footer.hebrew' | translate }}
    </button>
    <span class="select-none text-sm text-muted-foreground/80" aria-hidden="true">/</span>
    <button
      type="button"
      class="min-h-touch min-w-touch rounded-md border px-3 py-1.5 text-sm font-medium transition-colors"
      [ngClass]="
        currentLang === 'en'
          ? 'border-primary bg-primary/20 text-primary'
          : 'border-input text-muted-foreground hover:bg-accent hover:text-accent-foreground'
      "
      [attr.aria-pressed]="currentLang === 'en'"
      (click)="setEnglish()"
    >
      {{ 'footer.english' | translate }}
    </button>
  </div>
</footer>
