<div class="grid grid-cols-7 gap-1.5 sm:gap-2">
  <ng-container *ngFor="let row of numbers">
    <button
      *ngFor="let num of row"
      type="button"
      (click)="selectBid(num)"
      [disabled]="disabled"
      [attr.aria-pressed]="selectedBid === num"
      [attr.aria-label]="'הימור ' + num"
      [class.bg-amber-500]="selectedBid === num"
      [class.bg-slate-700]="selectedBid !== num"
      [class.text-white]="selectedBid === num"
      [class.text-slate-300]="selectedBid !== num"
      [class.opacity-50]="disabled"
      [class.cursor-not-allowed]="disabled"
      class="min-h-touch min-w-[2.25rem] sm:min-w-0 px-2 sm:px-3 py-2.5 sm:py-2 rounded-lg font-medium text-sm sm:text-base transition-colors focus-visible:ring-2 focus-visible:ring-amber-500 focus-visible:ring-offset-2 focus-visible:ring-offset-slate-800"
      [class.hover:bg-amber-600]="!disabled"
    >
      {{ num }}
    </button>
  </ng-container>
</div>
