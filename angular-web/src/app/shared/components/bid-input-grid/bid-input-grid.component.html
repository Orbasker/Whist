<div class="grid grid-cols-7 gap-1.5 sm:gap-2">
  <ng-container *ngFor="let row of numbers">
    <button
      *ngFor="let num of row"
      type="button"
      (click)="selectBid(num)"
      [disabled]="disabled"
      [attr.aria-pressed]="selectedBid === num"
      [attr.aria-label]="'הימור ' + num"
      class="h-10 w-10 sm:h-11 sm:w-11 rounded-full font-bold text-sm transition-all duration-200 focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background flex items-center justify-center"
      [ngClass]="{
        'bg-secondary-container text-on-secondary-container shadow-[0_0_12px_rgba(238,152,0,0.25)]':
          selectedBid === num,
        'bg-surface-container-highest text-on-surface-variant hover:bg-surface-bright':
          selectedBid !== num && !disabled,
        'bg-surface-container-highest/50 text-on-surface-variant/40 cursor-not-allowed': disabled,
      }"
    >
      {{ num }}
    </button>
  </ng-container>
</div>
