<div class="flex flex-wrap gap-2 justify-center">
  <button
    *ngFor="let option of trumpOptions"
    type="button"
    (click)="selectTrump(option.value)"
    [attr.aria-pressed]="selectedTrump === option.value"
    [attr.aria-label]="('game.biddingPhase.trump' | translate) + ': ' + (option.label | translate)"
    class="min-h-touch h-12 w-12 sm:h-14 sm:w-14 rounded-full font-bold text-lg transition-all duration-200 focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background flex items-center justify-center"
    [ngClass]="
      selectedTrump === option.value
        ? 'bg-tertiary-container text-on-tertiary-container shadow-[0_0_16px_rgba(241,196,0,0.3)] scale-110'
        : 'bg-surface-container-highest text-on-surface-variant hover:bg-surface-bright'
    "
  >
    <span *ngIf="option.icon" [class]="option.color" aria-hidden="true">{{ option.icon }}</span>
    <span *ngIf="!option.icon">{{ option.label | translate }}</span>
  </button>
</div>
