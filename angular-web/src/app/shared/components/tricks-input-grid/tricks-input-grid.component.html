<div class="grid grid-cols-7 gap-1.5 sm:gap-2">
  <ng-container *ngFor="let row of numbers">
    <button
      *ngFor="let num of row"
      type="button"
      (click)="selectTrick(num)"
      [disabled]="disabled"
      [attr.aria-pressed]="selectedTrick === num"
      [attr.aria-label]="'לקיחות ' + num"
      [class.bg-primary]="selectedTrick === num"
      [class.text-primary-foreground]="selectedTrick === num"
      [class.bg-muted]="selectedTrick !== num"
      [class.text-muted-foreground]="selectedTrick !== num"
      [class.opacity-50]="disabled"
      [class.cursor-not-allowed]="disabled"
      class="min-h-touch min-w-[2.25rem] rounded-lg px-2 py-2.5 font-medium text-sm transition-colors focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 focus-visible:ring-offset-background hover:opacity-90 sm:min-w-0 sm:px-3 sm:py-2 sm:text-base"
    >
      {{ num }}
    </button>
  </ng-container>
</div>
