name: whist_flutter
description: Whist game scoring - Flutter app (score table, round history, delete game).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.2
  shared_preferences: ^2.2.2
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
