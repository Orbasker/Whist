repos:
  # ── Backend (Python) ────────────────────────────────────────────────────────

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        name: ruff lint (backend)
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        name: ruff format (backend)
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        name: black format (backend)
        files: ^backend/
        language_version: python3.11

  - repo: local
    hooks:
      - id: ruff-ty
        name: ruff ty type check (backend)
        language: system
        entry: bash -c 'cd backend && uv sync --all-extras && uv run ty check app/'
        pass_filenames: false
        files: ^backend/

  - repo: local
    hooks:
      - id: pytest
        name: pytest (backend unit tests)
        language: system
        entry: bash -c 'cd backend && uv sync --all-extras && uv run python -m pytest tests/ -x -q'
        pass_filenames: false
        files: ^backend/
        stages: [pre-commit]

  # ── Frontend (Angular / Node) ───────────────────────────────────────────────

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd angular-web && ( [ -d node_modules ] || npm install ) && ./node_modules/.bin/eslint --fix "src/**/*.ts" --max-warnings=99'
        pass_filenames: false
        files: ^angular-web/src/.*\.(ts|html)$
        stages: [pre-commit]

      - id: prettier
        name: prettier format check (frontend)
        language: system
        entry: bash -c 'cd angular-web && npx prettier --write "src/**/*.{ts,html,scss,css}"'
        pass_filenames: false
        files: ^angular-web/src/.*\.(ts|html|scss|css)$
        stages: [pre-commit]

  # ── Flutter (flutter_mobile) ─────────────────────────────────────────────
  # Requires Flutter SDK on PATH (e.g. from FVM or system install).
  - repo: local
    hooks:
      - id: dart-format
        name: dart format (Flutter)
        language: system
        entry: bash -c 'cd flutter_mobile && dart format --set-exit-if-changed lib/ test/'
        pass_filenames: false
        files: ^flutter_mobile/.*\.dart$
        stages: [pre-commit]

      - id: dart-analyze
        name: dart analyze (Flutter)
        language: system
        entry: bash -lc 'cd flutter_mobile && if [ ! -d .dart_tool ] || [ pubspec.yaml -nt pubspec.lock ]; then flutter pub get; fi && flutter analyze --no-pub --fatal-warnings'
        pass_filenames: false
        files: ^flutter_mobile/
        stages: [pre-commit]
