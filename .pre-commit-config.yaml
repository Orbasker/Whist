repos:
  # ── Backend (Python) ────────────────────────────────────────────────────────

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        name: ruff lint (backend)
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        name: ruff format (backend)
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        name: black format (backend)
        files: ^backend/
        language_version: python3.11

  - repo: local
    hooks:
      - id: ruff-ty
        name: ruff ty type check (backend)
        language: system
        entry: bash -c 'cd backend && uv run ty check .'
        pass_filenames: false
        files: ^backend/

  - repo: local
    hooks:
      - id: pytest
        name: pytest (backend unit tests)
        language: system
        entry: bash -c 'cd backend && uv run python -m pytest tests/ -x -q'
        pass_filenames: false
        files: ^backend/
        stages: [pre-commit]

  # ── Frontend (Angular / Node) ───────────────────────────────────────────────

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd angular-web && npx eslint "src/**/*.ts" --max-warnings=99'
        pass_filenames: false
        files: ^angular-web/src/.*\.(ts|html)$
        stages: [pre-commit]

      - id: prettier
        name: prettier format check (frontend)
        language: system
        entry: bash -c 'cd angular-web && npx prettier --check "src/**/*.{ts,html,scss,css}"'
        pass_filenames: false
        files: ^angular-web/src/.*\.(ts|html|scss|css)$
        stages: [pre-commit]
