name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whist_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/whist_ci"
        run: uv run alembic upgrade head

      - name: Run Alembic migrations (Neon)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: uv run alembic upgrade head

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: ty type check
        run: ty check app/

      - name: Pytest with coverage
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: angular-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Angular build
        run: npm run build

      - name: Angular tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
